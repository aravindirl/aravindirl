<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — not found</title>
    <meta name="description" content="Page not found.">
    <meta name="robots" content="noindex">
    <style>
        :root {
            --bg-color: #f5ede0;
            --text-color: #1a1714;
            --accent-color: #b31c1c;
            --secondary-text: #7a6f68;
            --hr-color: #ddd0c2;
        }
        [data-theme="dark"] {
            --bg-color: #0e0e0e;
            --text-color: #ffffff;
            --accent-color: #34d399;
            --secondary-text: #888;
            --hr-color: #2a2a2a;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: ui-monospace, Menlo, Monaco, 'Cascadia Code', 'Source Code Pro', Consolas, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 40px 24px;
            margin: 0;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s, color 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .container { max-width: 650px; width: 100%; animation: fadeIn 0.4s ease forwards; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .site-title { font-size: 1.6rem; font-weight: bold; margin: 0; letter-spacing: -0.02em; }
        .site-title::before { content: '>_ '; color: var(--accent-color); font-weight: normal; }
        .site-title a { text-decoration: none; color: inherit; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 0.9em;
            background: var(--accent-color);
            vertical-align: middle;
            animation: blink 1.1s step-end infinite;
            margin-left: 3px;
        }
        #theme-toggle {
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        #theme-toggle svg { width: 16px; height: 16px; fill: currentColor; }
        #theme-toggle:hover { background-color: var(--text-color); color: var(--bg-color); }
        hr { border: 0; border-top: 1px solid var(--hr-color); margin: 20px 0; }
        nav a, .content-link, .back-nav {
            text-decoration: none;
            color: inherit;
            padding: 0 4px;
            transition: all 0.2s ease;
        }
        nav a:hover, .content-link:hover, .back-nav:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border-radius: 2px;
            text-decoration: none;
        }
        .content-link { color: var(--accent-color); text-decoration: underline; text-underline-offset: 3px; }
        p { margin-bottom: 14px; font-size: 1rem; }
        .copyright { font-size: 0.75rem; color: var(--secondary-text); margin-top: 25px; opacity: 0.8; }
        .back-nav { margin-top: 40px; display: inline-block; font-size: 0.9rem; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--hr-color); border-radius: 3px; }
        [data-theme="dark"] .site-title::before { text-shadow: 0 0 10px var(--accent-color); }
        [data-theme="dark"] .cursor { box-shadow: 0 0 8px var(--accent-color), 0 0 16px var(--accent-color); }
        ::selection { background: rgba(179, 28, 28, 0.15); }
        [data-theme="dark"] ::selection { background: rgba(212, 168, 67, 0.2); color: #fff; }
        .back-nav::before { content: '$ '; color: var(--accent-color); }
        html { scroll-behavior: smooth; }

        .error-code { font-size: 4rem; font-weight: bold; color: var(--accent-color); margin: 32px 0 8px; letter-spacing: -0.04em; line-height: 1; }
        [data-theme="dark"] .error-code { text-shadow: 0 0 20px var(--accent-color), 0 0 40px var(--accent-color); }
        .error-msg { font-size: 1rem; color: var(--secondary-text); margin-bottom: 28px; }
        .ls-block { margin: 24px 0; font-size: 0.9rem; }
        .ls-cmd { color: var(--accent-color); margin-bottom: 10px; }
        .ls-item { display: flex; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--hr-color); }
        .ls-item:first-of-type { border-top: 1px solid var(--hr-color); }
        .ls-perm { color: var(--secondary-text); font-size: 0.82rem; }
        .ls-name a { color: var(--text-color); text-decoration: none; }
        .ls-name a:hover { color: var(--accent-color); }
        [data-theme="dark"] .content-link { text-shadow: 0 0 6px rgba(212, 168, 67, 0.35); }
        .toast { position: fixed; bottom: 20px; right: 20px; font-size: 0.72rem; padding: 5px 10px; border: 1px solid var(--accent-color); color: var(--accent-color); background: var(--bg-color); border-radius: 3px; opacity: 0; transition: opacity 0.2s ease; pointer-events: none; z-index: 9999; font-family: inherit; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <h1 class="site-title"><a href="index.html">Aravind Ramachandran</a><span class="cursor"></span></h1>
            <button id="theme-toggle" aria-label="Toggle theme"><svg id="theme-icon" viewBox="0 0 24 24"></svg></button>
        </header>
        <hr>

        <div class="error-code">404</div>
        <div class="error-msg">page not found — this path doesn't exist</div>

        <div class="ls-block">
            <div class="ls-cmd">$ ls ./</div>
            <div class="ls-item">
                <span class="ls-perm">-rw-r--r--</span>
                <span class="ls-name"><a href="index.html">index.html</a></span>
            </div>
            <div class="ls-item">
                <span class="ls-perm">-rw-r--r--</span>
                <span class="ls-name"><a href="blogs.html">blogs.html</a></span>
            </div>
            <div class="ls-item">
                <span class="ls-perm">-rw-r--r--</span>
                <span class="ls-name"><a href="about.html">about.html</a></span>
            </div>
            <div class="ls-item">
                <span class="ls-perm">-rw-r--r--</span>
                <span class="ls-name"><a href="projects.html">projects.html</a></span>
            </div>
            <div class="ls-item">
                <span class="ls-perm">-rw-r--r--</span>
                <span class="ls-name"><a href="collection.html">collection.html</a></span>
            </div>
        </div>

        <a href="index.html" class="back-nav">← back to homepage</a>
        <div class="copyright">© <span id="year"></span> aravindirl. all rights reserved.</div>
    </div>
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;
        const sunIcon = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
        const moonIcon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
        function setFavicon(color) {
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="2" fill="${color}"/></svg>`;
            const link = document.querySelector('link[rel="icon"]') || document.createElement('link');
            link.rel = 'icon'; link.type = 'image/svg+xml';
            link.href = 'data:image/svg+xml,' + encodeURIComponent(svg);
            if (!link.parentNode) document.head.appendChild(link);
        }
        function applyTheme(theme) {
            if (theme === 'dark') {
                body.setAttribute('data-theme', 'dark');
                themeIcon.innerHTML = sunIcon;
                themeIcon.setAttribute('fill', 'none');
                themeIcon.setAttribute('stroke', 'currentColor');
                themeIcon.setAttribute('stroke-width', '2');
                setFavicon('#d4a843');
            } else {
                body.setAttribute('data-theme', 'light');
                themeIcon.innerHTML = moonIcon;
                themeIcon.setAttribute('fill', 'currentColor');
                themeIcon.setAttribute('stroke', 'none');
                setFavicon('#b31c1c');
            }
        }
        const savedTheme = localStorage.getItem('aravind-theme') || 'dark';
        applyTheme(savedTheme);
        toggleBtn.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('aravind-theme', newTheme);
            applyTheme(newTheme);
        });
        document.getElementById('year').textContent = new Date().getFullYear();

        (function() {
            const toast = document.createElement('div');
            toast.className = 'toast';
            document.body.appendChild(toast);
            document.addEventListener('keydown', e => {
                if (e.key === 't' && !e.ctrlKey && !e.metaKey && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
                    toggleBtn.click();
                    toast.textContent = '[theme: ' + document.body.getAttribute('data-theme') + ']';
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 1500);
                }
            });
        })();
    </script>
</body>
</html>
