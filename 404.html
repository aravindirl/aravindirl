<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>404 - Page Not Found | Aravind Ramachandran</title>
    <meta name="description" content="Page not found. Let me help you find what you're looking for.">
    <meta property="og:title" content="404 - Page Not Found">
    <meta property="og:description" content="Looks like this page doesn't exist.">
    <meta property="og:type" content="website">
    <meta name="author" content="Aravind Ramachandran">
    <meta name="robots" content="noindex, follow">
    <style>
        :root {
            --bg-color: #f5ede0;
            --text-color: #1a1714;
            --accent-color: #b31c1c;
            --secondary-text: #7a6f68;
            --hr-color: #ddd0c2;
        }
        [data-theme="dark"] {
            --bg-color: #0e0e0e;
            --text-color: #ffffff;
            --accent-color: #34d399;
            --secondary-text: #888;
            --hr-color: #2a2a2a;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: ui-monospace, Menlo, Monaco, 'Cascadia Code', 'Source Code Pro', Consolas, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 40px 24px;
            margin: 0;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s, color 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .container { max-width: 650px; width: 100%; animation: fadeIn 0.4s ease forwards; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .site-title { font-size: 1.6rem; font-weight: bold; margin: 0; letter-spacing: -0.02em; }
        .site-title::before { content: '>_ '; color: var(--accent-color); font-weight: normal; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 0.9em;
            background: var(--accent-color);
            vertical-align: middle;
            animation: blink 1.1s step-end infinite;
            margin-left: 3px;
        }
        #theme-toggle {
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        #theme-toggle svg { width: 16px; height: 16px; fill: currentColor; }
        #theme-toggle:hover { background-color: var(--text-color); color: var(--bg-color); }
        hr { border: 0; border-top: 1px solid var(--hr-color); margin: 20px 0; }
        p { margin-bottom: 18px; font-size: 1rem; }
        .error-code { font-size: 3rem; font-weight: bold; color: var(--accent-color); margin: 40px 0 20px 0; line-height: 1; }
        .error-message { font-size: 1.3rem; margin-bottom: 20px; }
        .nav-links { margin: 28px 0; }
        .nav-links a { display: inline-block; color: var(--accent-color); text-decoration: underline; text-underline-offset: 3px; margin-bottom: 10px; }
        .nav-links a:hover { background-color: var(--accent-color); color: var(--bg-color); border-radius: 2px; text-decoration: none; padding: 0 2px; }
        .copyright { font-size: 0.75rem; color: var(--secondary-text); margin-top: 25px; opacity: 0.8; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--hr-color); border-radius: 3px; }
        [data-theme="dark"] .site-title::before { text-shadow: 0 0 10px var(--accent-color); }
        [data-theme="dark"] .cursor { box-shadow: 0 0 8px var(--accent-color), 0 0 16px var(--accent-color); }
        ::selection { background: rgba(179, 28, 28, 0.15); }
        [data-theme="dark"] ::selection { background: rgba(52, 211, 153, 0.2); color: #fff; }
        html { scroll-behavior: smooth; }
        .site-title a { text-decoration: none; color: inherit; }
        @media (max-width: 540px) { body { padding: 24px 16px; } .site-title { font-size: 1.3rem; } .error-code { font-size: 2rem; } }
    </style>
    <script defer data-domain="aravindirl.com" src="https://plausible.io/js/script.js"></script>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <h1 class="site-title"><a href="/">Aravind Ramachandran</a><span class="cursor"></span></h1>
            <button id="theme-toggle" aria-label="Toggle theme"><svg id="theme-icon" viewBox="0 0 24 24"></svg></button>
        </header>
        <hr>

        <div class="error-code">404</div>
        <div class="error-message">page not found</div>
        <p>The page you're looking for doesn't exist. But here's what I recommend:</p>

        <nav class="nav-links">
            <a href="/">← back to homepage</a><br>
            <a href="/blogs.html">browse my blogs</a><br>
            <a href="/projects/projects.html">check out my projects</a><br>
            <a href="/about/about.html">learn more about me</a>
        </nav>

        <div class="copyright">© <span id="year"></span> aravindirl. all rights reserved.</div>
    </div>
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;
        const sunIcon = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
        const moonIcon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
        function setFavicon(color) {
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="2" fill="${color}"/></svg>`;
            const link = document.querySelector('link[rel="icon"]') || document.createElement('link');
            link.rel = 'icon'; link.type = 'image/svg+xml';
            link.href = 'data:image/svg+xml,' + encodeURIComponent(svg);
            if (!link.parentNode) document.head.appendChild(link);
        }
        function applyTheme(theme) {
            if (theme === 'dark') {
                body.setAttribute('data-theme', 'dark');
                themeIcon.innerHTML = sunIcon;
                themeIcon.setAttribute('fill', 'none');
                themeIcon.setAttribute('stroke', 'currentColor');
                themeIcon.setAttribute('stroke-width', '2');
                setFavicon('#34d399');
            } else {
                body.setAttribute('data-theme', 'light');
                themeIcon.innerHTML = moonIcon;
                themeIcon.setAttribute('fill', 'currentColor');
                themeIcon.setAttribute('stroke', 'none');
                setFavicon('#b31c1c');
            }
        }
        const savedTheme = localStorage.getItem('aravind-theme') || 'dark';
        applyTheme(savedTheme);
        toggleBtn.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('aravind-theme', newTheme);
            applyTheme(newTheme);
        });
        document.getElementById('year').textContent = new Date().getFullYear();

        (function() {
            document.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
                    e.preventDefault();
                    history.back();
                }
                if (e.key === 't' && !e.ctrlKey && !e.metaKey && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
                    toggleBtn.click();
                }
            });
        })();
    </script>
</body>
</html>
