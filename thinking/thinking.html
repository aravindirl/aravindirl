<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me & Claude | Aravind Ramachandran</title>
    <meta name="description" content="Thinking in public with Claude. Raw thinking, unstructured prompts.">
    <meta property="og:title" content="Me & Claude | Thinking">
    <meta property="og:description" content="Thinking in public with Claude. Raw thinking, unstructured prompts.">
    <meta property="og:type" content="website">
    <meta name="author" content="Aravind Ramachandran">
    <meta name="robots" content="index, follow">
    <meta property="og:image" content="https://www.aravindirl.com/og.svg">
    <meta property="og:url" content="https://www.aravindirl.com/thinking/thinking.html">
    <link rel="canonical" href="https://www.aravindirl.com/thinking/thinking.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://www.aravindirl.com/og.svg">
    <style>
        :root {
            --bg-color: #f5ede0;
            --text-color: #1a1714;
            --accent-color: #b31c1c;
            --secondary-text: #7a6f68;
            --hr-color: #ddd0c2;
        }
        [data-theme="dark"] {
            --bg-color: #0e0e0e;
            --text-color: #ffffff;
            --accent-color: #34d399;
            --secondary-text: #888;
            --hr-color: #2a2a2a;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: ui-monospace, Menlo, Monaco, 'Cascadia Code', 'Source Code Pro', Consolas, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 40px 24px;
            margin: 0;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s, color 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .container { max-width: 650px; width: 100%; animation: fadeIn 0.4s ease forwards; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .site-title { font-size: 1.6rem; font-weight: bold; margin: 0; letter-spacing: -0.02em; }
        .site-title::before { content: '>_ '; color: var(--accent-color); font-weight: normal; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 0.9em;
            background: var(--accent-color);
            vertical-align: middle;
            animation: blink 1.1s step-end infinite;
            margin-left: 3px;
        }
        h1 { font-size: 1.3rem; font-weight: bold; margin: 28px 0 6px 0; letter-spacing: -0.01em; }
        #theme-toggle {
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        #theme-toggle svg { width: 16px; height: 16px; fill: currentColor; }
        #theme-toggle:hover { background-color: var(--text-color); color: var(--bg-color); }
        hr { border: 0; border-top: 1px solid var(--hr-color); margin: 20px 0; }
        .copyright { font-size: 0.75rem; color: var(--secondary-text); margin-top: 12px; opacity: 0.8; }
        .back-nav { margin-top: 40px; display: inline-block; font-size: 0.9rem; text-decoration: none; color: inherit; padding: 0 4px; transition: all 0.2s ease; }
        .back-nav:hover { background-color: var(--accent-color); color: var(--bg-color); border-radius: 2px; }
        .back-nav::before { content: '$ '; color: var(--accent-color); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--hr-color); border-radius: 3px; }
        [data-theme="dark"] .site-title::before { text-shadow: 0 0 10px var(--accent-color); }
        [data-theme="dark"] .cursor { box-shadow: 0 0 8px var(--accent-color), 0 0 16px var(--accent-color); }
        ::selection { background: rgba(179, 28, 28, 0.15); }
        [data-theme="dark"] ::selection { background: rgba(52, 211, 153, 0.2); color: #fff; }
        html { scroll-behavior: smooth; }
        .content-link { color: var(--accent-color); text-decoration: underline; text-underline-offset: 3px; }

        /* Conversations grid */
        .conversations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1px;
            background-color: var(--hr-color);
            border: 1px solid var(--hr-color);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 32px;
        }
        .conversation-card {
            background: var(--bg-color);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            padding: 16px;
            transition: background-color 0.15s ease;
        }
        .conversation-card:hover { background-color: var(--hr-color); }
        .conv-meta { font-size: 0.68rem; color: var(--secondary-text); margin-bottom: 8px; }
        .conv-title { font-size: 0.95rem; font-weight: bold; margin-bottom: 8px; line-height: 1.4; }
        .conv-summary { font-size: 0.78rem; color: var(--secondary-text); font-style: italic; margin-bottom: 12px; line-height: 1.5; flex: 1; }
        .conv-tag { display: inline-block; font-size: 0.68rem; padding: 2px 6px; border: 1px solid var(--hr-color); border-radius: 2px; margin-right: 6px; margin-bottom: 6px; color: var(--secondary-text); }
        .conv-arrow { color: var(--secondary-text); transition: transform 0.15s ease, color 0.15s ease; }
        .conversation-card:hover .conv-arrow { transform: translateX(3px); color: var(--accent-color); }

        @media (max-width: 540px) {
            body { padding: 24px 16px; }
            .site-title { font-size: 1.3rem; }
            h1 { font-size: 1.1rem; }
            .conversations-grid { grid-template-columns: 1fr; }
            .conv-title { font-size: 0.92rem; }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <h1 class="site-title"><a href="../index.html">Aravind Ramachandran</a><span class="cursor"></span></h1>
            <button id="theme-toggle" aria-label="Toggle theme"><svg id="theme-icon" viewBox="0 0 24 24"></svg></button>
        </header>
        <hr>

        <h1>me & claude:-</h1>
        <p style="font-size: 0.9rem; color: var(--secondary-text); margin-bottom: 24px;">thinking in public w/ unstructured prompts.</p>

        <div class="conversations-grid" id="conversations-grid">
            <!-- Conversations will be populated here -->
        </div>

        <a href="../index.html" class="back-nav">← back to homepage</a>
        <div class="copyright">© <span id="year"></span> aravindirl. all rights reserved. <span style="opacity: 0.7;">made with intent</span></div>
    </div>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;
        const sunIcon = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
        const moonIcon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;

        function setFavicon(color) {
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="2" fill="${color}"/></svg>`;
            const link = document.querySelector('link[rel="icon"]') || document.createElement('link');
            link.rel = 'icon'; link.type = 'image/svg+xml';
            link.href = 'data:image/svg+xml,' + encodeURIComponent(svg);
            if (!link.parentNode) document.head.appendChild(link);
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                body.setAttribute('data-theme', 'dark');
                themeIcon.innerHTML = sunIcon;
                themeIcon.setAttribute('fill', 'none');
                themeIcon.setAttribute('stroke', 'currentColor');
                themeIcon.setAttribute('stroke-width', '2');
                setFavicon('#d4a843');
            } else {
                body.setAttribute('data-theme', 'light');
                themeIcon.innerHTML = moonIcon;
                themeIcon.setAttribute('fill', 'currentColor');
                themeIcon.setAttribute('stroke', 'none');
                setFavicon('#b31c1c');
            }
        }

        const savedTheme = localStorage.getItem('aravind-theme') || 'dark';
        applyTheme(savedTheme);
        toggleBtn.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('aravind-theme', newTheme);
            applyTheme(newTheme);
        });
        document.getElementById('year').textContent = new Date().getFullYear();

        // Sample conversations data
        const conversations = [
            {
                id: 'markets-ai',
                title: 'AI & Market Shifts',
                summary: 'Exploring how AI adoption might reshape market structures and economic incentives.',
                date: '05 may',
                tags: ['markets', 'ai', 'systems'],
                exchanges: 3
            },
            {
                id: 'attention-patterns',
                title: 'Patterns in Attention',
                summary: 'Understanding how attention economy dynamics play out in different platforms.',
                date: '04 may',
                tags: ['attention', 'internet', 'behavior'],
                exchanges: 5
            },
            {
                id: 'frameworks-thinking',
                title: 'Building Mental Models',
                summary: 'How to construct better frameworks for understanding complex systems.',
                date: '03 may',
                tags: ['thinking', 'meta', 'learning'],
                exchanges: 4
            }
        ];

        const grid = document.getElementById('conversations-grid');
        conversations.forEach(conv => {
            const card = document.createElement('a');
            card.href = `${conv.id}.html`;
            card.className = 'conversation-card';
            card.innerHTML = `
                <div class="conv-meta">#${conversations.indexOf(conv) + 1} · ${conv.date} · ${conv.exchanges} exchanges</div>
                <div class="conv-title">${conv.title}</div>
                <div class="conv-summary">${conv.summary}</div>
                <div style="margin-top: auto;">
                    ${conv.tags.map(tag => `<span class="conv-tag">${tag}</span>`).join('')}
                    <span class="conv-arrow" style="float: right;">→</span>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
