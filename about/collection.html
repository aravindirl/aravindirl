<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aravind Ramachandran | Collection</title>
    <link rel="icon" href="/favicon.ico">
    <meta name="description" content="Aravind Ramachandran's digital collection — music, films, books, photography and more.">
    <meta property="og:title" content="Aravind Ramachandran | Collection">
    <meta property="og:description" content="Music I keep returning to, films and notes, books, photography and more.">
    <meta property="og:type" content="website">
    <meta name="author" content="Aravind Ramachandran">
    <meta name="robots" content="index, follow">
    <meta property="og:image" content="https://www.aravindirl.com/og.svg">
    <meta property="og:url" content="https://www.aravindirl.com/about/collection.html">
    <link rel="canonical" href="https://www.aravindirl.com/about/collection.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://www.aravindirl.com/og.svg">
    <style>
        :root {
            --bg-color: #f5ede0;
            --text-color: #1a1714;
            --accent-color: #b31c1c;
            --secondary-text: #4a4440;
            --hr-color: #ddd0c2;
        }
        [data-theme="dark"] {
            --bg-color: #0e0e0e;
            --text-color: #ffffff;
            --accent-color: #34d399;
            --secondary-text: #b0b0b0;
            --hr-color: #2a2a2a;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: ui-monospace, Menlo, Monaco, 'Cascadia Code', 'Source Code Pro', Consolas, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 40px 24px;
            margin: 0;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s, color 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .container { max-width: 650px; width: 100%; animation: fadeIn 0.4s ease forwards; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .site-title { font-size: 1.6rem; font-weight: bold; margin: 0; letter-spacing: -0.02em; }
        .site-title::before { content: '>_ '; color: var(--accent-color); font-weight: normal; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 0.9em;
            background: var(--accent-color);
            vertical-align: middle;
            animation: blink 1.1s step-end infinite;
            margin-left: 3px;
        }
        h2 { font-size: 1.2rem; font-weight: bold; margin: 0 0 20px 0; }
        #theme-toggle {
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        #theme-toggle svg { width: 16px; height: 16px; fill: currentColor; }
        #theme-toggle:hover { background-color: var(--text-color); color: var(--bg-color); }
        hr { border: 0; border-top: 1px solid var(--hr-color); margin: 20px 0; }
        nav { font-size: 0.9rem; display: flex; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
        .sep { color: var(--secondary-text); padding: 0 3px; user-select: none; }
        nav a, .content-link, .back-nav {
            text-decoration: none;
            color: inherit;
            padding: 0 4px;
            transition: all 0.2s ease;
        }
        nav a:hover, .content-link:hover, .back-nav:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border-radius: 2px;
            text-decoration: none;
        }
        .content-link { color: var(--accent-color); text-decoration: underline; text-underline-offset: 3px; }
        p { margin-bottom: 14px; font-size: 1rem; }
        .copyright { font-size: 0.75rem; color: var(--secondary-text); margin-top: 25px; opacity: 0.8; }
        .back-nav { margin-top: 40px; display: inline-block; font-size: 0.9rem; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--hr-color); border-radius: 3px; }
        [data-theme="dark"] .site-title::before { text-shadow: 0 0 10px var(--accent-color); }
        [data-theme="dark"] .cursor { box-shadow: 0 0 8px var(--accent-color), 0 0 16px var(--accent-color); }
        ::selection { background: rgba(179, 28, 28, 0.15); }
        [data-theme="dark"] ::selection { background: rgba(212, 168, 67, 0.2); color: #fff; }
        .back-nav::before { content: '$ '; color: var(--accent-color); }
        html { scroll-behavior: smooth; }
        .site-title a { text-decoration: none; color: inherit; }
        [data-theme="dark"] .content-link { text-shadow: 0 0 6px rgba(212, 168, 67, 0.35); }
        .toast { position: fixed; bottom: 20px; right: 20px; font-size: 0.72rem; padding: 5px 10px; border: 1px solid var(--accent-color); color: var(--accent-color); background: var(--bg-color); border-radius: 3px; opacity: 0; transition: opacity 0.2s ease; pointer-events: none; z-index: 9999; font-family: inherit; }
        .toast.show { opacity: 1; }
        .crate-list { margin: 16px 0 32px; }
        .crate-entry { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; padding: 10px 8px; border-bottom: 1px solid var(--hr-color); border-radius: 3px; margin: 0 -8px; text-decoration: none; color: inherit; transition: padding-left 0.15s ease, background-color 0.15s ease; }
        .crate-entry:first-child { border-top: 1px solid var(--hr-color); }
        .crate-entry:hover { padding-left: 18px; background-color: var(--hr-color); }
        .crate-name { font-size: 0.95rem; color: var(--accent-color); }
        .crate-desc { font-size: 0.82rem; color: var(--secondary-text); text-align: right; }
        @media (max-width: 540px) { body { padding: 24px 16px; } .site-title { font-size: 1.3rem; } }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <h1 class="site-title"><a href="../index.html">Aravind Ramachandran</a><span class="cursor"></span></h1>
            <button id="theme-toggle" aria-label="Toggle theme"><svg id="theme-icon" viewBox="0 0 24 24"></svg></button>
        </header>
        <hr>
        <h2>collection:-</h2>

        <div class="crate-list">
            <a href="https://open.spotify.com/user/vtubl2p2emhobb5yc4qdzorc2" target="_blank" rel="noopener noreferrer" class="crate-entry">
                <span class="crate-name">spotify</span>
                <span class="crate-desc">music i keep returning to</span>
            </a>
            <a href="https://letterboxd.com/aravind26/" target="_blank" rel="noopener noreferrer" class="crate-entry">
                <span class="crate-name">letterboxd</span>
                <span class="crate-desc">films and notes</span>
            </a>
            <a href="https://myanimelist.net/profile/aravindirl" target="_blank" rel="noopener noreferrer" class="crate-entry">
                <span class="crate-name">my animelist</span>
                <span class="crate-desc">anime and manga</span>
            </a>
            <a href="https://youtube.com/playlist?list=PLtsg_LLoffZwATzGKPouffjOs4HRlZR3P&si=XXxzcPlhH2098JWU" target="_blank" rel="noopener noreferrer" class="crate-entry">
                <span class="crate-name">youtube</span>
                <span class="crate-desc">videos worth revisiting</span>
            </a>
            <a href="https://aravindirl.notion.site/articles-and-writings-from-the-internet-that-stayed-with-me-2c9ea2287b7e80339860f4edf55248b7?source=copy_link" target="_blank" rel="noopener noreferrer" class="crate-entry">
                <span class="crate-name">notion</span>
                <span class="crate-desc">articles and references</span>
            </a>
            <a href="https://www.goodreads.com/user/show/166509546-aravind" target="_blank" rel="noopener noreferrer" class="crate-entry">
                <span class="crate-name">goodreads</span>
                <span class="crate-desc">books</span>
            </a>
            <a href="https://500px.com/p/raravind2610?view=photos" target="_blank" rel="noopener noreferrer" class="crate-entry">
                <span class="crate-name">500px</span>
                <span class="crate-desc">photography</span>
            </a>
        </div>

        <a href="about.html" class="back-nav">← back to about</a>
        <div class="copyright">© <span id="year"></span> aravindirl. all rights reserved.</div>
    </div>
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;
        const sunIcon = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
        const moonIcon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
        function setFavicon(color) {
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="2" fill="${color}"/></svg>`;
            const link = document.querySelector('link[rel="icon"]') || document.createElement('link');
            link.rel = 'icon'; link.type = 'image/svg+xml';
            link.href = 'data:image/svg+xml,' + encodeURIComponent(svg);
            if (!link.parentNode) document.head.appendChild(link);
        }
        function applyTheme(theme) {
            if (theme === 'dark') {
                body.setAttribute('data-theme', 'dark');
                themeIcon.innerHTML = sunIcon;
                themeIcon.setAttribute('fill', 'none');
                themeIcon.setAttribute('stroke', 'currentColor');
                themeIcon.setAttribute('stroke-width', '2');
                setFavicon('#d4a843');
            } else {
                body.setAttribute('data-theme', 'light');
                themeIcon.innerHTML = moonIcon;
                themeIcon.setAttribute('fill', 'currentColor');
                themeIcon.setAttribute('stroke', 'none');
                setFavicon('#b31c1c');
            }
        }
        const savedTheme = localStorage.getItem('aravind-theme') || 'dark';
        applyTheme(savedTheme);
        toggleBtn.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('aravind-theme', newTheme);
            applyTheme(newTheme);
        });
        document.getElementById('year').textContent = new Date().getFullYear();

        (function() {
            const toast = document.createElement('div');
            toast.className = 'toast';
            document.body.appendChild(toast);
            document.addEventListener('keydown', e => {
                if (e.key === 't' && !e.ctrlKey && !e.metaKey && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
                    toggleBtn.click();
                    toast.textContent = '[theme: ' + document.body.getAttribute('data-theme') + ']';
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 1500);
                }
            });
        })();
    </script>
</body>
</html>
