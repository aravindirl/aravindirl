    <style>
        :root { --bg:#ffffff; --text:#000000; --secondary:#555; --link:#0000EE; --link-v:#0000EE; --border:#000; --bq:#333; }
        [data-theme="dark"] { --bg:#111111; --text:#e8e8e8; --secondary:#888; --link:#0000EE; --link-v:#0000EE; --border:#ccc; --bq:#aaa; }
        #theme-toggle { position:fixed; top:12px; right:14px; background:none; border:none; color:var(--text); font-size:1.2rem; width:40px; height:40px; cursor:pointer; z-index:999; display:flex; align-items:center; justify-content:center; padding:0; line-height:1; -webkit-tap-highlight-color:transparent; }
        #theme-toggle:hover { opacity:0.5; }
                *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: ui-monospace, Menlo, Monaco, 'Cascadia Code', 'Source Code Pro', Consolas, monospace;
            background-color:var(--bg);
            color:var(--text);
            font-size: 13px;
            line-height: 1.6;
            padding: 32px 36px;
            margin: 0;
        }
        .container {
            max-width: 860px;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: bold;
            margin: 0 0 20px 0;
        }
        ol {
            margin: 0 0 40px 0;
            padding-left: 28px;
        }
        ol li {
            margin-bottom: 8px;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        ol li a {
            color:var(--link);
            text-decoration: underline;
        }
        ol li a:visited {
            color:var(--link-v);
        }
        .back-link {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            color:var(--text);
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .back-link:visited {
            color:var(--text);
        }
        @media (max-width: 640px) {
            body { padding: 20px 16px; }
        }
    </style>
</head>
<body data-theme="light">
    <button id="theme-toggle">●</button>
    <script>
    (function(){
        var btn=document.getElementById('theme-toggle');
        function apply(t){ document.body.setAttribute('data-theme',t); btn.textContent='●'; }
        apply(localStorage.getItem('aravind-theme')||'light');
        btn.addEventListener('click',function(){ var t=document.body.getAttribute('data-theme')==='dark'?'light':'dark'; localStorage.setItem('aravind-theme',t); apply(t); });
        document.addEventListener('keydown',function(e){
            if(e.key==='Backspace'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){ e.preventDefault(); history.back(); }
            if(e.key==='t'&&!e.ctrlKey&&!e.metaKey&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){ btn.click(); }
        });
    })();
    </script>
